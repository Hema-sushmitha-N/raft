services:
  node1:
    build: .
    command: ["-id", "node1", "-grpc-port", "50051", "-metrics-port", "9091"]
    ports:
      - "9091:9091"
      - "50051:50051"
    tmpfs:
      - /wal
    cap_add:
      - NET_ADMIN

